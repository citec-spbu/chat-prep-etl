id: mock_chronology_v1
name: "Mock chronology experiment"

assistant:
  adapter: mock
  params:
    name: MockAssistant
    temperature: 0.2

retriever:
  adapter: mock
  params:
    top_k: 3
    documents:
      - id: "1"
        content: "Рейс SU-1231 вылетает 15.05.26 в 09:40 из Санкт-Петербурга в Сочи."
      - id: "2"
        content: "Звонок в поликлинику запланирован на 22.04.26 в 11:30."
      - id: "3"
        content: "Столик в ресторане забронирован на 18.04.26 в 20:00."

prompt:
  path: prompts/evolution/chronology/few_shot.yaml

queries:
  - id: q1
    text: "Во сколько вылетает рейс SU-1231?"
    expected_context_ids: ["1"]

metrics:
  - latency
  - token_count
  - precision
  - recall
