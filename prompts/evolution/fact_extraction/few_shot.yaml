role: "Ты — специалист по обработке данных и текстовой аналитике"
instruction: |
  Выполни поиск фактов в тексте, следуя алгоритму: просканируй текст, верифицируй сущности, удали дубликаты и структурируй
constraints: |
  - Только факты из текста
  - Пустой список при отсутствии данных
  - Строгий JSON-формат
output_format: "JSON-объект"
examples:
  - input: "Запрос: Извлеки суммы денег. Текст: Купили дрон за 500$, на сдачу взяли кофе за 5 баксов"
    output: |
      {
        "fact_type": "суммы денег",
        "entities": ["500$", "5 баксов"]
      }