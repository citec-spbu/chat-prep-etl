questions:
  - id: information_search_1
    query: "Найди обсуждение, где у машины перестала корректно работать навигация или отображение маршрута. В чём заключалась проблема и какое объяснение ей дали?"
    ground_truth: >
      В переписке обсуждалось, что официальная навигация в регионе пользователя работает ограниченно или не работает. В качестве обходного варианта упоминались прошитые или старые карты. В одном кейсе после обновлений перестало показывать остаток батареи до точки маршрута; участники связали это с тем, что ранее установленные карты могли “слететь” или перестать корректно работать после прошивки.

  - id: information_search_2
    query: "Найди сообщения, где обсуждалась проблема с обновлением ПО машины. На каком этапе возникала ошибка и какие признаки проблемы были описаны?"
    ground_truth: >
      Проблема обновления описывалась как зависание или остановка скачивания/установки на процентах. В одном обсуждении процесс доходил до 67% или 83%, затем останавливался. В других сообщениях обсуждалось, что машина скачивает обновления через Wi-Fi, а через мобильную сеть может приходить только уведомление. Также встречался кейс, где обновления не приходили длительное время, хотя сертификаты и связь считались активными.

  - id: information_search_3
    query: "Найди обсуждение, где речь шла о потере или некорректной работе мобильной сети в машине. Какие исходные условия были указаны и какую возможную причину назвали?"
    ground_truth: >
      Обсуждались случаи, когда SIM-карта была установлена, но сеть пропадала или работала нестабильно. В одном кейсе сеть могла появляться после перезагрузки, но затем снова отсутствовала. Возможная причина — оператор определяет устройство как модем/роутер по IMEI/TTL и блокирует трафик. Поэтому предлагали использовать тариф именно для модема, роутера или интернет-устройства, а не обычный телефонный тариф.

  - id: information_search_4
    query: "Найди сообщения, где обсуждалась неверная геопозиция машины. В какой город или регион смещалась позиция и как это объясняли?"
    ground_truth: >
      В переписке встречались кейсы неверной геопозиции. В одном случае машина показывала положение “где-то в Китае” из-за GPS lock; после обращения в поддержку или к импортёру положение начало отображаться корректнее. В другом случае позицию унесло в Симферополь, и это объясняли защитой от беспилотников в Москве.

  - id: information_search_5
    query: "Найди обсуждение, где упоминалась платная онлайн-связь машины. Какие функции с ней связывали и что предлагали сделать при её отсутствии?"
    ground_truth: >
      С платной онлайн-связью связывали спутниковые карты с трафиком, онлайн-стриминг музыки и видео, веб-браузер, просмотр камер из приложения, улучшенную визуализацию и навигацию. В качестве обходного варианта предлагали повторную привязку машины к аккаунту через приложение: удалить авто, добавить снова по VIN, выбрать регион и загрузить фото VIN/документов. Для машин из некоторых регионов отдельно предупреждали не выполнять такую инструкцию.

  - id: information_search_6
    query: "Найди сообщения, где обсуждались тематические чаты, каналы или направления сообщества. Какие направления были перечислены?"
    ground_truth: >
      В переписке был список тематических направлений сообщества: аренда и тест-драйвы, консультации, покупка машин в наличии и на заказ, колёса/резина/тормоза, тюнинг, барахолка, детейлинг, диагностика/Toolbox, сервис, запчасти, отдельные чаты по моделям и городам.

  - id: information_search_7
    query: "Найди технический кейс, где после отключения или замены детали машина перестала видеть связанный с ней модуль или камеру. Какой способ восстановления предлагался?"
    ground_truth: >
      В переписке были кейсы, когда после отключения или замены детали, например поворотника с камерой или задней камеры, машина переставала видеть камеру или связанный модуль. Предлагались проверки проводки/шлейфов, замена повреждённых элементов, а также Reset DAS в сервисном режиме: Service Mode → Drive Assist → Camera → Reset DAS.

  - id: information_search_8
    query: "Найди обсуждение, где проблема с ограничением функции машины была связана с датчиком температуры. Какой симптом был описан и что оказалось причиной?"
    ground_truth: >
      Обсуждалось ограничение рекуперации. В одном кейсе пользователь обнаружил, что машина стояла в тёплом боксе при +25°C, но на табло показывала 0°C. Из-за этого рекуперация была ограничена. После перезагрузки машина показала +20°C, и рекуперация вернулась.
