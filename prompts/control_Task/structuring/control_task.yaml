questions:
  - id: structuring_30
    query: "Сгруппируй найденные обсуждения в таблицу по типам: ПО и обновления, навигация, мобильная связь, зарядка, батарея и рекуперация, шины, кузов и запчасти, покупка и оформление. Для каждой группы укажи 1–2 характерных примера из переписки."
    ground_truth: >
      Группы обсуждений: ПО и обновления — зависание на 67/83%, Wi-Fi для загрузки; навигация — не отображается спутник/маршрут, прошивка карт; мобильная связь — SIM, модем, тариф, блокировка; зарядка — поездки, мощности, домашняя линия; батарея/рекуперация — температура, полный заряд, датчик; шины — давление, пятно контакта, сопротивление качению; кузов/запчасти — ограничители, фильтры, рычаги, камеры; покупка/оформление — утиль, растаможка, ЭПТС, машины “под ключ”.
