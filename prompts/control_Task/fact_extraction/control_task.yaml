questions:
  - id: fact_extraction_9
    query: "Извлеки из переписки цены на запчасти, аксессуары или диагностические устройства. Представь ответ в формате: товар — цена — дополнительные условия."
    ground_truth: >
      В переписке встречались такие цены: SIM-карта или услуга, связанная с ней, — 25 000 руб.; зарядные устройства — 11 999 ₽, 12 000 ₽, 24 999 ₽, 29 999 ₽, 79 000 ₽; диагностический кабель — 2 490 ₽ и 2 990 ₽ для разных групп машин; дверной ограничитель — 2 999 ₽ за штуку; повторитель поворота с камерой — 14 999 ₽ или 19 999 ₽ за штуку в разных объявлениях; датчики давления — 5 999 ₽ за штуку или 19 999 ₽ за комплект; комплект фильтров — около 20 000 ₽ или 15 000 ₽ при удобной встрече; защита патрубков/двигателей — примерно 3 000–7 999 ₽.

  - id: fact_extraction_10
    query: "Найди объявление о продаже дверного ограничителя. Какая цена была указана, какие партномера приведены и какие условия получения товара описаны?"
    ground_truth: >
      Цена дверного ограничителя — 2 999 ₽ за штуку. Были указаны партномера L 1089507-00-D и R 1110298-00-D. Условия: товар находится в Москве, возможна отправка в регионы, в более поздних версиях объявления также указана возможность установки в сервисе.

  - id: fact_extraction_11
    query: "Найди объявление о диагностическом кабеле. Какие цены были указаны для разных групп машин и какие действия с машиной через него обещались?"
    ground_truth: >
      Диагностический кабель предлагался по цене 2 490 ₽ для одной группы машин и 2 990 ₽ для других групп. Указывалось, что кабель подключается к соответствующему порту и ноутбуку, подходит даже для Mac. Через него обещали прошивать дополнительные функции, обновлять ПО и изменять конфигурацию, а при наличии Toolbox — делать это удалённо.

  - id: fact_extraction_12
    query: "Найди обсуждение или объявление, где упоминался комплект фильтров. Что входило в комплект, какая цена называлась и при каком условии цена могла быть ниже?"
    ground_truth: >
      В комплект входили HEPA-фильтрующий элемент и салонный угольный фильтр. Цена называлась около 20 000 ₽ за всё. При удобной встрече в Москве продавец был готов отдать комплект за 15 000 ₽.

  - id: fact_extraction_13
    query: "Найди сообщения, где обсуждалась покупка машины из-за рубежа после изменения обязательного сбора. Какие суммы или ориентиры назывались и какой практический вывод сделали участники?"
    ground_truth: >
      Обсуждались утильсбор, растаможка, ЭПТС и покупка машины из-за рубежа. Встречались ориентиры: 50 000 $ “под ключ” для машины за рубежом, рост утильсбора с десятков тысяч до сотен тысяч рублей, а позже — расчёты, где для мощных машин сбор может измеряться миллионами. Практический вывод: после изменения обязательного сбора привоз может стать менее выгодным, а покупка внутри страны — практичнее, если нужная версия уже есть на рынке.

  - id: fact_extraction_14
    query: "Найди сообщения, где упоминались сроки выполнения работ или действий. Какие временные интервалы назывались и к каким действиям они относились?"
    ground_truth: >
      В переписке встречались такие интервалы: установка пневмоподвески — 6–7 часов; установка/настройка навигации — около 1 часа; зарядка до полной на CCS2 — около 1 часа; в поездках упоминались зарядки 35 минут, 45–50 минут, 50 минут, 1:20, 1:30, 2:30; акция бесплатной зарядки — с 22 апреля по 1 июня 2022; маршрут на 3300 км занял 3 суток + 8 часов.

  - id: fact_extraction_15
    query: "Найди обсуждение обновления ПО, где упоминались проценты прогресса. Какие проценты назывались и что происходило после их достижения?"
    ground_truth: >
      В обсуждениях обновления упоминались проценты 67% и 83%: обновление скачивалось до этих значений, затем останавливалось. Также обсуждалось, что обновления скачиваются через Wi-Fi, а через мобильную сеть приходит только уведомление.
