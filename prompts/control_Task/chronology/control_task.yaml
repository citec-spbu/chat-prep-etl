questions:
  - id: chronology_22
    query: "Составь хронологию обсуждения проблемы с навигацией: какой симптом описали сначала, какие уточнения появились, какую причину предположили и что предложили сделать."
    ground_truth: >
      Сначала описывался симптом: не работает навигация, не отображается спутниковый режим, не показывается маршрут или остаток заряда до точки. Затем уточняли, работает ли просто карта, построение маршрута и какая версия карт установлена. Потом появлялась версия о региональных ограничениях, прошитых картах или слетевших картах после обновления. В качестве решения предлагали проверить карты, связь, версию навигации или обращаться к тем, кто занимается прошивкой/настройкой карт.

  - id: chronology_23
    query: "Составь хронологию проблемы с обновлением ПО: на каких процентах процесс останавливался, какие уточнения задавались и какие направления решения обсуждались."
    ground_truth: >
      Сначала фиксировалось, что обновление скачивается до определённого процента — 67% или 83% — и останавливается. Затем уточняли, скачивание это или установка, через какой канал машина получает обновления, есть ли Wi-Fi, SIM и сертификаты. Направления решения: дать машине стабильный Wi-Fi, проверить состояние через сервисные инструменты, попробовать reinstall/redeploy, проверить сертификаты, VPN, регион/GPS и возможные последствия неофициальной настройки.

  - id: chronology_24
    query: "Восстанови последовательность обсуждения платной онлайн-связи и внешнего интернета: какие функции были важны, какой обходной способ предлагался и какие ограничения оставались."
    ground_truth: >
      Сначала обсуждалось, какие функции даёт платная онлайн-связь: карты с трафиком, стриминг, браузер, камеры, улучшенная навигация. Затем предлагалась повторная привязка машины к аккаунту с выбором региона и загрузкой документов. Параллельно обсуждалось, что для обновлений и стабильной связи нужен интернет, а обычная SIM может не подойти, потому что оператор блокирует трафик как модемный. Поэтому предлагались Wi-Fi, внешний модем, роутер или специальный тариф.

  - id: chronology_25
    query: "Составь хронологию проблемы с ограничением рекуперации: первый симптом, найденная причина, выполненное действие и итоговый результат."
    ground_truth: >
      Сначала обсуждалось, что рекуперация ограничена или отсутствует. В общих объяснениях назывались температура батареи, двигателя/инвертора и уровень заряда. В конкретном кейсе нашли аномалию: машина стояла в тёплом боксе при +25°C, но показывала 0°C. После перезагрузки температура стала +20°C, пользователь проехал до дома, и рекуперация вернулась.

  - id: chronology_26
    query: "Построй краткую хронологию смены тем по корпусу переписки: какие темы встречались в ранних сообщениях, какие стали чаще появляться позже и какие повторялись на протяжении всего корпуса."
    ground_truth: >
      В ранних сообщениях чаще встречались общие вопросы эксплуатации: зарядка, приложение, SIM, навигация, автопилот, камеры, обновления. В средней части корпуса усиливаются темы поездок, зарядной инфраструктуры, карт, сервиса, запчастей, резины, растаможки и оформления. В поздних файлах чаще встречаются объявления, диагностические кабели, модемы, платная онлайн-связь, GPS, утильсбор, импорт, неофициальные функции и конкретные неисправности. На протяжении всего корпуса повторяются зарядка, обновления, связь, навигация, запчасти и купля-продажа.
