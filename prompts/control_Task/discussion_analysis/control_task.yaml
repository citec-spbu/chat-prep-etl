questions:
  - id: discussion_analysis_16
    query: "Проанализируй спор о давлении в шинах. Какие аргументы приводились о влиянии давления на запас хода, пятно контакта, сопротивление качению и безопасность?"
    ground_truth: >
      Высокое давление связывали с меньшим пятном контакта, меньшим сопротивлением качению и большим запасом хода. Низкое давление связывали с большим пятном контакта и лучшим сцеплением, но также с рисками для шины. Отдельно спорили о корректности сравнения дорожной машины с гоночными автомобилями: у них другие масса, нагрузки, давление, температура и ресурс шин.

  - id: discussion_analysis_17
    query: "Проанализируй обсуждение неофициальных карт и расширенных функций помощи водителю. Какие ограничения назывались и какой практический вывод можно сделать?"
    ground_truth: >
      Обсуждались региональные ограничения официальной навигации, прошитые карты, старые карты, зависимость расширенных функций от карт, сертификатов, компьютера автопилота и прошивки. Практический вывод: для работы некоторых функций недостаточно штатной машины; нужны корректные карты, активные сертификаты, подходящая конфигурация и иногда неофициальная настройка.

  - id: discussion_analysis_18
    query: "Найди обсуждения, где речь шла о неофициальном изменении конфигурации, прошивке, сертификатах, диагностическом кабеле или сервисном режиме. Какие риски или ограничения из них следуют?"
    ground_truth: >
      Риски и ограничения: прошитые карты или изменённая конфигурация могут мешать обновлениям; машина может быть “криво прошита”; могут слететь сертификаты; последствия иногда сложно или невозможно исправить. Диагностический кабель и Toolbox дают доступ к конфигу, обновлениям и функциям, но это связано с неофициальным вмешательством, рисками после обновлений и зависимостью от состояния сертификатов.

  - id: discussion_analysis_19
    query: "Проанализируй обсуждение внешнего модема, роутера или специального интернет-тарифа. Почему обычная SIM-карта могла не подойти и какие обходные варианты предлагались?"
    ground_truth: >
      Обычная SIM-карта могла не подойти, потому что оператор определяет устройство как модем/компьютер по IMEI или TTL и блокирует трафик. Также обсуждалось, что для некоторых машин в регионе не хватает нужных частот встроенного модема. Варианты решения: тариф для модема/роутера, отдельная интернет-опция, другой оператор, внешний USB-модем, мобильный роутер или раздача Wi-Fi.

  - id: discussion_analysis_20
    query: "Найди пример обсуждения, где участники предложили несколько вариантов проверки, но в найденном контексте нет подтверждённого финального решения. В чём была проблема и какие варианты проверки назывались?"
    ground_truth: >
      Пример 1: после замены или отключения камеры/повторителя машина перестала видеть камеру. Предлагали проверять проводку/шлейфы, менять повреждённые элементы, делать Reset DAS через сервисный режим. Пример 2: машина не обновлялась длительное время, хотя сертификаты были активны. Предлагали VPN, reinstall/redeploy, проверки через Toolbox, смотреть ошибки и состояние сервисных модулей. В найденных фрагментах финальное подтверждение результата не всегда есть.

  - id: discussion_analysis_21
    query: "Найди в переписке примеры четырёх типов сообщений: техническая поддержка, купля-продажа, спор, совет по эксплуатации. Кратко объясни, по каким признакам ты отнёс сообщения к каждому типу."
    ground_truth: >
      Техническая поддержка — сообщения с симптомом и вопросом “что делать”: нет сети, не работает камера, не идёт обновление, ограничена рекуперация. Купля-продажа — сообщения с хэштегами, ценой, городом, условиями отправки или установки. Спор — длинные обсуждения давления в шинах, утильсбора, автономных функций, прошивок и карт. Совет по эксплуатации — сообщения с конкретным действием: использовать модемный тариф, подключить Wi-Fi, выполнить Reset DAS, не мешать машине завершить процесс, проверить сервисный режим.
