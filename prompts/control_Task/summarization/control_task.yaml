questions:
  - id: summarization_27
    query: "Сделай краткое резюме переписки по техническим проблемам: какие неисправности или сбои чаще всего обсуждались и какие типовые решения предлагались?"
    ground_truth: >
      Чаще всего обсуждались проблемы с навигацией и картами, обновлениями ПО, SIM/мобильной сетью, Wi-Fi и модемами, платной онлайн-связью, зарядкой, камерами, рекуперацией, датчиками температуры, шинами и сервисным режимом. Типовые решения: проверить интернет и Wi-Fi, использовать подходящий тариф, перезагрузить машину, проверить сервисный режим, выполнить Reset DAS, обратиться к специалистам по картам/прошивке, проверить проводку/шлейфы, использовать Toolbox или диагностический кабель.

  - id: summarization_28
    query: "Сделай краткое резюме коммерческих сообщений: какие товары, услуги или машины чаще всего предлагались, какие параметры обычно указывались в объявлениях?"
    ground_truth: >
      Коммерческие сообщения обычно содержали товар или услугу, цену, город, совместимость, условия отправки, возможность установки и иногда партномера. Часто предлагались зарядные устройства и кабели, диагностические кабели, дверные ограничители, повторители поворота с камерой, датчики давления, фильтры, рычаги, защита патрубков/двигателей, машины с описанием комплектации, пробега, документов и состояния.

  - id: summarization_29
    query: "Выдели основные нерешённые или неполностью закрытые вопросы в переписке. Для каждого укажи, почему нельзя считать обсуждение завершённым."
    ground_truth: >
      Неполностью закрытые вопросы: зависающие обновления, потому что в найденном контексте есть диагностика и варианты, но не всегда есть финальное подтверждение результата; проблемы с SIM/модемом, потому что обсуждаются разные причины — тариф, частоты, IMEI/TTL, оператор; проблемы с камерой/повторителем, где предлагается Reset DAS или проверка проводки, но не всегда есть подтверждённый итог; проблемы с GPS lock, где есть объяснения и обращения в поддержку, но не всегда ясна точная причина; случаи с неофициальной прошивкой и сертификатами, где последствия зависят от конкретной конфигурации машины.
