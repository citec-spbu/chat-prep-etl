[workspace]
name = "chat-prep-etl"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]
conda-pypi-map = { "conda-forge" = "conda_pypi_mapping.json" }

# --- 1. General ---
[dependencies]
python-dotenv = "*"
pyyaml = "*"
requests = "*"
pandas = "*"

# --- 2. ETL ---
[feature.etl.dependencies]
python = "3.11.*"
bs4 = "*"
lxml = "*"
emoji = "*"
pymorphy2 = "*"
python-socks = ">=2.8.1,<3"
loguru = ">=0.7.3,<0.8"


[feature.etl.pypi-dependencies]
natasha = ">=1.6.0, <2"
pymorphy2-dicts-ru = "*"
telethon = "*"
setuptools = "==69.5.1" 
qdrant-client = ">=1.18.0, <2"
fastembed = ">=0.8.0, <0.9"
fastapi = ">=0.136.1, <0.137"
uvicorn = ">=0.46.0, <0.47"






# --- 3.  FRONT  ---
[feature.front.dependencies]
python = "3.12.*"
fastapi = "*"
uvicorn = "*"

[feature.front.pypi-dependencies]
python-multipart = "*"




# --- 4. LLM ---
[feature.llm.dependencies]
python = "3.12.*"
pytorch = "*"
fastapi = "*"
uvicorn = "*"
pydantic = ">=2.5,<3"
langchain = ">=0.3.0"
langchain-openai = ">=0.1.0"
bert_score = "*"
sentence-transformers = "*"
nltk = "*"
rouge-score = "*"
tenacity = ">=8.4.1,<9.0.0"
rich = ">=13.6.0,<15.0.0"

[feature.llm.pypi-dependencies]
deepeval = ">=0.27.0"        

# ------
[environments]
etl-env = ["etl"]
front-env = ["front"]
llm-env = ["llm"]

[pypi-dependencies]
qdrant-client = ">=1.18.0, <2"
